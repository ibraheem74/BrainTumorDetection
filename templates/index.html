<!DOCTYPE html>
<html>
<head>
    <title>Brain Tumor Detection</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f5f5f5;
            text-align:center;
            margin-top:40px;
        }

        .container{
            width:700px;
            margin:auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px gray;
        }

        img{
            width:300px;
            margin:20px;
            border:2px solid #ccc;
        }

        input{
            margin:20px;
        }

        button{
            padding:10px 25px;
            font-size:18px;
            cursor:pointer;
        }
    </style>
</head>
<body>

<div class="container">

<h1>Brain Tumor Detection using Attention U-Net</h1>

<form action="/predict" method="POST" enctype="multipart/form-data">

<input type="file" name="image" required>

<br>

<button type="submit">Predict</button>

</form>

{% if uploaded_image %}

<h2>Uploaded MRI</h2>

<img src="{{ uploaded_image }}">

{% endif %}

{% if predicted_image %}

<h2>Predicted Tumor Mask</h2>

<img src="{{ predicted_image }}">

{% endif %}
{% if result %}

<h2>Prediction Result</h2>

<h3>{{ result }}</h3>

<p>
<b>Confidence:</b> {{ confidence }}%
</p>

<p>
<b>Tumor Pixels:</b> {{ tumor_pixels }}
</p>

{% endif %}

</div>

</body>
</html>
